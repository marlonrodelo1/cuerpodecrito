<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sede | Iglesia Cuerpo de Cristo</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    body { background: var(--color-bg); }

    .admin-hero {
      background: linear-gradient(135deg, #0a1520, #050a05);
      padding: calc(var(--nav-height) + var(--sp-10)) 0 var(--sp-8);
      border-bottom: 1px solid var(--color-border);
    }
    .admin-hero h1 { font-size: var(--text-2xl); font-weight: 900; margin-bottom: var(--sp-2); }
    .admin-hero p  { color: var(--color-text-muted); font-size: var(--text-sm); }

    .admin-content { padding: var(--sp-8) 0 var(--sp-16); }

    .admin-section {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--sp-8);
      margin-bottom: var(--sp-6);
    }
    .admin-section-title {
      font-size: var(--text-lg);
      font-weight: 700;
      margin-bottom: var(--sp-5);
      color: var(--color-accent);
    }
    .admin-hint {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      margin-bottom: var(--sp-4);
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-4);
      margin-bottom: var(--sp-5);
    }
    .admin-field-full { grid-column: span 2; }
    .admin-label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      margin-bottom: var(--sp-2);
    }

    .admin-schedule-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-3);
      margin-bottom: var(--sp-5);
    }
    .admin-schedule-row {
      display: flex;
      flex-direction: column;
      gap: var(--sp-1);
    }
    .admin-schedule-label {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .admin-programs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--sp-3);
      margin-bottom: var(--sp-5);
    }
    .admin-program-check {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      background: var(--color-bg-raised);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--sp-3) var(--sp-4);
      cursor: pointer;
      transition: border-color var(--t-fast);
      font-size: var(--text-sm);
      font-weight: 500;
    }
    .admin-program-check:hover { border-color: var(--color-accent); }
    .admin-program-check input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--color-accent); flex-shrink: 0;
    }

    .admin-section-stream { border-color: rgba(239,83,80,0.3); }
    .admin-stream-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-3);
      margin-bottom: var(--sp-4);
    }
    .admin-stream-actions { display: flex; gap: var(--sp-3); flex-wrap: wrap; margin-bottom: var(--sp-2); }
    .admin-btn-live { background: #ef5350; border-color: #ef5350; }
    .admin-btn-live:hover { background: #e53935; border-color: #e53935; }

    .admin-save-msg {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-left: var(--sp-3);
      transition: opacity 0.3s;
    }

    #admin-loader { padding: var(--sp-12); }
    #admin-error {
      display: none;
      background: rgba(239,83,80,0.1);
      border: 1px solid rgba(239,83,80,0.3);
      border-radius: var(--radius-lg);
      padding: var(--sp-6);
      color: #ef9a9a;
      text-align: center;
    }

    @media (max-width: 768px) {
      .admin-form-grid   { grid-template-columns: 1fr; }
      .admin-field-full  { grid-column: span 1; }
      .admin-schedule-grid { grid-template-columns: 1fr; }
      .admin-programs-grid { grid-template-columns: 1fr; }
      .admin-stream-row  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido</a>

  <!-- NAVEGACIÓN -->
  <header class="site-header">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Inicio">
        <div class="nav-logo-icon">✝</div>
        <div class="nav-logo-text">
          <span class="nav-logo-name">Cuerpo de Cristo</span>
          <span class="nav-logo-place">Panel Admin</span>
        </div>
      </a>
      <nav class="nav-menu" role="navigation">
        <a href="index.html" class="nav-link">← Volver al sitio</a>
        <a href="admin-devocional.html" class="nav-link">Devocional</a>
        <a href="admin-ubicaciones.html" class="nav-link active">Mi Sede</a>
      </nav>
      <button class="nav-hamburger" aria-label="Abrir menú" aria-expanded="false">
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
      </button>
    </div>
  </header>

  <main id="main">
    <div class="admin-hero">
      <div class="container">
        <h1>⚙️ Panel de Administración</h1>
        <p>Gestiona los horarios, programas y transmisiones en vivo de tu sede.</p>
      </div>
    </div>

    <div class="admin-content">
      <div class="container" style="max-width: 860px;">

        <!-- Loader -->
        <div class="loader" id="admin-loader">
          <div class="loader-spinner"></div>
          <span>Cargando datos de tu sede...</span>
        </div>

        <!-- Error -->
        <div id="admin-error"></div>

        <!-- Panel (rellenado por JS) -->
        <div id="admin-panel" style="display:none;"></div>

      </div>
    </div>
  </main>

  <script src="js/nav.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/supabase-client.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-ubicaciones.js" defer></script>
  <script>document.getElementById('footer-year') && (document.getElementById('footer-year').textContent = new Date().getFullYear());</script>
</body>
</html>
