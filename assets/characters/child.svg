<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 220" class="char-child" role="img" aria-label="Niño caminando animado">
  <style>
    .char-child { animation: child-enter 1.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes child-enter { from{transform:translateX(-120px);opacity:0;} to{transform:translateX(0);opacity:1;} }
    .body     { animation: body-bounce 0.6s ease-in-out infinite; }
    @keyframes body-bounce { 0%,50%,100%{transform:translateY(0);} 25%,75%{transform:translateY(-4px);} }
    .head     { animation: head-bob 0.6s ease-in-out infinite; transform-origin: 60px 46px; }
    @keyframes head-bob { 0%,50%,100%{transform:rotate(0);} 25%{transform:rotate(3deg);} 75%{transform:rotate(-3deg);} }
    .leg-l    { animation: leg-forward 0.6s ease-in-out infinite; transform-origin: 52px 140px; }
    .leg-r    { animation: leg-back    0.6s ease-in-out infinite; transform-origin: 68px 140px; }
    .arm-l    { animation: arm-forward 0.6s ease-in-out infinite; transform-origin: 38px 108px; }
    .arm-r    { animation: arm-back    0.6s ease-in-out infinite; transform-origin: 82px 108px; }
    @keyframes leg-forward { 0%,100%{transform:rotate(-18deg);} 50%{transform:rotate(18deg);} }
    @keyframes leg-back    { 0%,100%{transform:rotate(18deg);}  50%{transform:rotate(-18deg);} }
    @keyframes arm-forward { 0%,100%{transform:rotate(18deg);}  50%{transform:rotate(-18deg);} }
    @keyframes arm-back    { 0%,100%{transform:rotate(-18deg);} 50%{transform:rotate(18deg);} }
    .char-child.waving .arm-r { animation: wave-hand 0.7s ease-in-out 4; transform-origin: 82px 108px; }
    @keyframes wave-hand { 0%,100%{transform:rotate(-20deg);} 30%{transform:rotate(-60deg);} 70%{transform:rotate(-10deg);} }
  </style>

  <!-- === PIERNAS === -->
  <g class="leg-l">
    <!-- Pierna izquierda -->
    <rect x="44" y="140" width="16" height="50" rx="8" fill="#1565c0"/>
    <!-- Pie izquierdo -->
    <ellipse cx="52" cy="192" rx="12" ry="7" fill="#5d4037"/>
    <rect x="44" y="186" width="18" height="10" rx="5" fill="#5d4037"/>
  </g>
  <g class="leg-r">
    <!-- Pierna derecha -->
    <rect x="60" y="140" width="16" height="50" rx="8" fill="#1976d2"/>
    <!-- Pie derecho -->
    <ellipse cx="68" cy="192" rx="12" ry="7" fill="#5d4037"/>
    <rect x="58" y="186" width="18" height="10" rx="5" fill="#5d4037"/>
  </g>

  <!-- === CUERPO === -->
  <g class="body">
    <!-- Torso -->
    <rect x="38" y="100" width="44" height="46" rx="14" fill="#e53935"/>
    <!-- Detalle camisa -->
    <line x1="60" y1="100" x2="60" y2="146" stroke="#c62828" stroke-width="2" stroke-dasharray="4,4"/>
    <!-- Cinturón -->
    <rect x="38" y="136" width="44" height="8" rx="3" fill="#795548"/>
    <rect x="54" y="134" width="12" height="10" rx="2" fill="#ffd54f"/>

    <!-- BRAZOS -->
    <g class="arm-l">
      <rect x="24" y="104" width="16" height="36" rx="8" fill="#e53935"/>
      <!-- Mano izquierda -->
      <circle cx="32" cy="142" r="8" fill="#ffb74d"/>
    </g>
    <g class="arm-r">
      <rect x="80" y="104" width="16" height="36" rx="8" fill="#e53935"/>
      <!-- Mano derecha -->
      <circle cx="88" cy="142" r="8" fill="#ffb74d"/>
    </g>

    <!-- CUELLO -->
    <rect x="52" y="90" width="16" height="16" rx="6" fill="#ffb74d"/>

    <!-- CABEZA -->
    <g class="head">
      <!-- Cabeza -->
      <circle cx="60" cy="60" r="32" fill="#ffb74d"/>
      <!-- Pelo -->
      <ellipse cx="60" cy="32" rx="30" ry="14" fill="#5d4037"/>
      <rect x="30" y="32" width="60" height="16" fill="#5d4037" rx="4"/>
      <!-- Flequillo -->
      <ellipse cx="60" cy="42" rx="26" ry="8" fill="#6d4c41"/>

      <!-- Ojos -->
      <circle cx="48" cy="62" r="6" fill="white"/>
      <circle cx="72" cy="62" r="6" fill="white"/>
      <circle cx="50" cy="63" r="4" fill="#212121"/>
      <circle cx="74" cy="63" r="4" fill="#212121"/>
      <circle cx="51" cy="62" r="1.5" fill="white"/>
      <circle cx="75" cy="62" r="1.5" fill="white"/>

      <!-- Cejas -->
      <path d="M43,55 Q48,52 53,55" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M67,55 Q72,52 77,55" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Nariz -->
      <ellipse cx="60" cy="70" rx="4" ry="3" fill="#e8a87c"/>
      <circle cx="58" cy="70" r="1.5" fill="#c4845c"/>
      <circle cx="62" cy="70" r="1.5" fill="#c4845c"/>

      <!-- Sonrisa -->
      <path d="M50,78 Q60,86 70,78" stroke="#c4845c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Mejillas sonrosadas -->
      <ellipse cx="43" cy="73" rx="7" ry="5" fill="#ff8a80" opacity="0.4"/>
      <ellipse cx="77" cy="73" rx="7" ry="5" fill="#ff8a80" opacity="0.4"/>

      <!-- Orejas -->
      <ellipse cx="28" cy="62" rx="5" ry="7" fill="#ffb74d"/>
      <ellipse cx="92" cy="62" rx="5" ry="7" fill="#ffb74d"/>
    </g>
  </g>
</svg>
