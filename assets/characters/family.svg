<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" class="char-family" role="img" aria-label="Familia animada con cesta de alimentos">
  <style>
    .adult1  { animation: family-sway 3s ease-in-out infinite; transform-origin: 60px 210px; }
    .adult2  { animation: family-sway 3s ease-in-out infinite 0.6s; transform-origin: 180px 210px; }
    .child-f { animation: family-sway 2.2s ease-in-out infinite 0.3s; transform-origin: 120px 210px; }
    .wave-arm { animation: hand-wave 1.6s ease-in-out infinite; transform-origin: 195px 110px; }
    .basket-shadow { animation: basket-shadow 3s ease-in-out infinite; }
    @keyframes family-sway   { 0%,100%{transform:rotate(0);}  30%{transform:rotate(2.5deg);}  70%{transform:rotate(-2.5deg);} }
    @keyframes hand-wave     { 0%,100%{transform:rotate(0);}  25%{transform:rotate(-42deg);} 75%{transform:rotate(15deg);} }
    @keyframes basket-shadow { 0%,100%{opacity:0.35;transform:scaleX(1);} 50%{opacity:0.6;transform:scaleX(1.15);} }
  </style>

  <!-- === ADULTO 1 (izquierda) === -->
  <g class="adult1">
    <!-- Piernas -->
    <rect x="45" y="155" width="14" height="52" rx="7" fill="#1565c0"/>
    <rect x="63" y="155" width="14" height="52" rx="7" fill="#1976d2"/>
    <!-- Pies -->
    <ellipse cx="52" cy="208" rx="11" ry="6" fill="#4e342e"/>
    <ellipse cx="70" cy="208" rx="11" ry="6" fill="#4e342e"/>
    <!-- Cuerpo -->
    <rect x="40" y="105" width="46" height="56" rx="14" fill="#388e3c"/>
    <!-- Brazos -->
    <rect x="22" y="108" width="20" height="40" rx="10" fill="#388e3c"/>
    <rect x="80" y="108" width="20" height="40" rx="10" fill="#388e3c"/>
    <!-- Manos -->
    <circle cx="32" cy="150" r="9" fill="#ffb74d"/>
    <circle cx="90" cy="150" r="9" fill="#ffb74d"/>
    <!-- Cuello -->
    <rect x="52" y="94" width="18" height="17" rx="8" fill="#ffb74d"/>
    <!-- Cabeza -->
    <circle cx="61" cy="73" r="28" fill="#ffb74d"/>
    <!-- Pelo oscuro -->
    <ellipse cx="61" cy="48" rx="26" ry="12" fill="#4e342e"/>
    <rect x="33" y="50" width="56" height="14" rx="6" fill="#4e342e"/>
    <!-- Ojos -->
    <circle cx="52" cy="74" r="5" fill="white"/><circle cx="70" cy="74" r="5" fill="white"/>
    <circle cx="53" cy="75" r="3.5" fill="#212121"/><circle cx="71" cy="75" r="3.5" fill="#212121"/>
    <circle cx="54" cy="74" r="1.2" fill="white"/><circle cx="72" cy="74" r="1.2" fill="white"/>
    <!-- Sonrisa -->
    <path d="M52,85 Q61,92 70,85" stroke="#c4845c" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- === NIÑO CENTRO === -->
  <g class="child-f">
    <!-- Piernas -->
    <rect x="107" y="165" width="12" height="42" rx="6" fill="#7b1fa2"/>
    <rect x="122" y="165" width="12" height="42" rx="6" fill="#9c27b0"/>
    <!-- Pies -->
    <ellipse cx="113" cy="208" rx="9" ry="5" fill="#4e342e"/>
    <ellipse cx="128" cy="208" rx="9" ry="5" fill="#4e342e"/>
    <!-- Cuerpo -->
    <rect x="100" y="120" width="40" height="50" rx="12" fill="#f06292"/>
    <!-- Brazos -->
    <rect x="86" y="122" width="16" height="30" rx="8" fill="#f06292"/>
    <rect x="138" y="122" width="16" height="30" rx="8" fill="#f06292"/>
    <!-- Manos -->
    <circle cx="94" cy="154" r="7" fill="#ffb74d"/>
    <circle cx="146" cy="154" r="7" fill="#ffb74d"/>
    <!-- Cuello -->
    <rect x="113" y="110" width="14" height="14" rx="6" fill="#ffb74d"/>
    <!-- Cabeza -->
    <circle cx="120" cy="92" r="24" fill="#ffb74d"/>
    <!-- Coletas -->
    <ellipse cx="96" cy="85" rx="8" ry="14" fill="#5d4037" transform="rotate(-10,96,85)"/>
    <ellipse cx="144" cy="85" rx="8" ry="14" fill="#5d4037" transform="rotate(10,144,85)"/>
    <ellipse cx="120" cy="70" rx="22" ry="10" fill="#5d4037"/>
    <!-- Ojos -->
    <circle cx="112" cy="93" r="5" fill="white"/><circle cx="128" cy="93" r="5" fill="white"/>
    <circle cx="113" cy="94" r="3.5" fill="#212121"/><circle cx="129" cy="94" r="3.5" fill="#212121"/>
    <circle cx="114" cy="93" r="1.2" fill="white"/><circle cx="130" cy="93" r="1.2" fill="white"/>
    <!-- Sonrisa -->
    <path d="M112,102 Q120,109 128,102" stroke="#c4845c" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Mejillas -->
    <ellipse cx="106" cy="100" rx="7" ry="5" fill="#ff8a80" opacity="0.45"/>
    <ellipse cx="134" cy="100" rx="7" ry="5" fill="#ff8a80" opacity="0.45"/>
  </g>

  <!-- === ADULTO 2 (derecha, con brazo que saluda) === -->
  <g class="adult2">
    <!-- Piernas -->
    <rect x="165" y="155" width="14" height="52" rx="7" fill="#0277bd"/>
    <rect x="183" y="155" width="14" height="52" rx="7" fill="#0288d1"/>
    <!-- Pies -->
    <ellipse cx="172" cy="208" rx="11" ry="6" fill="#4e342e"/>
    <ellipse cx="190" cy="208" rx="11" ry="6" fill="#4e342e"/>
    <!-- Cuerpo -->
    <rect x="160" y="105" width="46" height="56" rx="14" fill="#e64a19"/>
    <!-- Brazo izquierdo normal -->
    <rect x="142" y="108" width="20" height="40" rx="10" fill="#e64a19"/>
    <circle cx="152" cy="150" r="9" fill="#ffccbc"/>
    <!-- Brazo derecho (el que saluda) -->
    <g class="wave-arm">
      <rect x="200" y="90" width="20" height="36" rx="10" fill="#e64a19"/>
      <circle cx="210" cy="126" r="9" fill="#ffccbc"/>
    </g>
    <!-- Cuello -->
    <rect x="172" y="94" width="18" height="17" rx="8" fill="#ffccbc"/>
    <!-- Cabeza -->
    <circle cx="181" cy="73" r="28" fill="#ffccbc"/>
    <!-- Pelo rubio -->
    <ellipse cx="181" cy="48" rx="26" ry="11" fill="#f9a825"/>
    <rect x="153" y="50" width="56" height="12" rx="6" fill="#f9a825"/>
    <!-- Ojos -->
    <circle cx="172" cy="74" r="5" fill="white"/><circle cx="190" cy="74" r="5" fill="white"/>
    <circle cx="173" cy="75" r="3.5" fill="#1565c0"/><circle cx="191" cy="75" r="3.5" fill="#1565c0"/>
    <circle cx="174" cy="74" r="1.2" fill="white"/><circle cx="192" cy="74" r="1.2" fill="white"/>
    <!-- Sonrisa -->
    <path d="M172,85 Q181,92 190,85" stroke="#c4845c" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- === CESTA DE ALIMENTOS === -->
  <g transform="translate(90,170)">
    <!-- Sombra -->
    <ellipse cx="50" cy="52" rx="42" ry="8" fill="#000" class="basket-shadow"/>
    <!-- Cesta -->
    <path d="M10,20 Q12,50 50,52 Q88,50 90,20 Z" fill="#8d6e63"/>
    <path d="M10,20 Q12,40 50,42 Q88,40 90,20" fill="#795548" stroke="#6d4c41" stroke-width="1"/>
    <!-- Asas -->
    <path d="M25,20 Q30,5 50,5 Q70,5 75,20" fill="none" stroke="#6d4c41" stroke-width="5" stroke-linecap="round"/>
    <!-- Líneas cesta -->
    <line x1="20" y1="20" x2="18" y2="48" stroke="#6d4c41" stroke-width="1.5"/>
    <line x1="35" y1="20" x2="34" y2="50" stroke="#6d4c41" stroke-width="1.5"/>
    <line x1="50" y1="20" x2="50" y2="51" stroke="#6d4c41" stroke-width="1.5"/>
    <line x1="65" y1="20" x2="66" y2="50" stroke="#6d4c41" stroke-width="1.5"/>
    <line x1="80" y1="20" x2="82" y2="48" stroke="#6d4c41" stroke-width="1.5"/>
    <!-- Alimentos en cesta -->
    <circle cx="32" cy="14" r="8" fill="#f44336"/><!-- tomate -->
    <ellipse cx="48" cy="12" rx="10" ry="7" fill="#ffd54f"/><!-- pan -->
    <circle cx="65" cy="14" r="7" fill="#66bb6a"/><!-- manzana -->
    <circle cx="65" cy="8" r="3" fill="#388e3c"/><!-- tallo manzana -->
  </g>
</svg>
